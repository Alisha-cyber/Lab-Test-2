<div class="container">
  @if (loading) {
    <div class="spinner">
      <mat-spinner></mat-spinner>
    </div>
  }

  @if (!loading) {
    <div class="card-grid">
      @for (character of characters; track character.id) {
        <mat-card class="character-card">
          <img
            mat-card-image
            [src]="character.image || 'https://via.placeholder.com/250x300?text=No+Image'"
            [alt]="character.name"
          />

          <mat-card-content>
            <h3>{{ character.name }}</h3>
            <p>{{ character.house || 'No House' }}</p>
          </mat-card-content>

          <mat-card-actions>
            <a [routerLink]="['/character', character.id]">
              <button mat-button color="primary">View Details</button>
            </a>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  }
</div>
